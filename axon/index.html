<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON - Gestão Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --dourado: #d4af37; --preto: #050505; --card: #111111; }
        body { background: var(--preto); color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
        .tela-auth { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        #tela-login, #tela-registro, #tela-app { display: none; }
        .ativa { display: flex !important; }
        .card-axon { background: var(--card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 12px; padding: 25px; width: 100%; max-width: 380px; }
        .axon-input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; outline: none; }
        .btn-premium { background: var(--dourado); color: #000; font-weight: 900; padding: 14px; border-radius: 8px; width: 100%; text-transform: uppercase; cursor: pointer; border: none; }
        .logo-axon { color: var(--dourado); font-weight: 900; font-size: 2rem; letter-spacing: 8px; margin-bottom: 2rem; }
    </style>
</head>
<body>

    <main id="tela-login" class="tela-auth ativa">
        <div class="logo-axon">AXON</div>
        <div class="card-axon">
            <input type="email" id="l-email" class="axon-input" placeholder="GMAIL:">
            <input type="password" id="l-senha" class="axon-input" placeholder="SENHA:">
            <button onclick="fazerLogin()" class="btn-premium">ENTRAR</button>
            <p onclick="irPara('tela-registro')" class="text-center mt-4 text-[10px] text-dourado cursor-pointer uppercase font-bold">Criar Conta Premium</p>
            <p id="e-login" class="text-red-500 text-[10px] mt-4 text-center font-bold"></p>
        </div>
    </main>

    <main id="tela-registro" class="tela-auth">
        <div class="logo-axon">AXON</div>
        <div class="card-axon">
            <input type="email" id="r-email" class="axon-input" placeholder="NOVO GMAIL:">
            <input type="password" id="r-senha" class="axon-input" placeholder="NOVA SENHA:">
            <button onclick="fazerRegistro()" class="btn-premium">FINALIZAR CADASTRO</button>
            <p onclick="irPara('tela-login')" class="text-center mt-4 text-[10px] text-dourado cursor-pointer uppercase font-bold">Voltar para Login</p>
            <p id="e-reg" class="text-red-500 text-[10px] mt-4 text-center font-bold"></p>
        </div>
    </main>

    <div id="tela-app" style="display:none">
        <header class="p-4 border-b-2 border-dourado flex justify-between items-center">
            <div class="text-dourado font-black tracking-widest">AXON</div>
            <button onclick="fazerLogout()" class="text-[10px] text-gray-500 font-bold uppercase">Sair</button>
        </header>
        <div class="p-4 text-center mt-20">
            <h1 class="text-dourado font-black text-2xl">SESSÃO ATIVA</h1>
            <p class="text-gray-500 mt-2">Dados carregados com sucesso.</p>
        </div>
    </div>

    <script>
        const URL = 'https://zqvfnykxwlcozvawqgrn.supabase.co';
        const KEY = 'SUA_KEY_AQUI'; // Wr, use sua key original aqui
        const _supa = supabase.createClient(URL, KEY);

        function irPara(id) {
            document.querySelectorAll('main, #tela-app').forEach(t => { t.classList.remove('ativa'); t.style.display = 'none'; });
            const alvo = document.getElementById(id);
            if(id === 'tela-app') alvo.style.display = 'block'; else alvo.classList.add('ativa');
        }

        async function verificarSessao() {
            const { data: { session } } = await _supa.auth.getSession();
            if (session) irPara('tela-app');
        }

        async function fazerLogin() {
            const email = document.getElementById('l-email').value.trim();
            const password = document.getElementById('l-senha').value.trim();
            const { error } = await _supa.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('e-login').innerText = error.message; else verificarSessao();
        }

        async function fazerRegistro() {
            const email = document.getElementById('r-email').value.trim();
            const password = document.getElementById('r-senha').value.trim();
            if(!email || !password) return;
            const { error } = await _supa.auth.signUp({ email, password });
            if (error) document.getElementById('e-reg').innerText = error.message; 
            else { alert("Sucesso! Agora faça Login."); irPara('tela-login'); }
        }

        async function fazerLogout() { await _supa.auth.signOut(); window.location.reload(); }

        verificarSessao();
    </script>
</body>
</html>
