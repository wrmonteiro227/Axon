<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AXON - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --dourado: #d4af37; --preto: #050505; }
        body { background-color: var(--preto); color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-auth { background: #111; border: 1px solid rgba(212, 175, 55, 0.2); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-axon { color: var(--dourado); font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 30px; font-weight: 900; }
        .axon-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .axon-input:focus { border-color: var(--dourado); }
        .btn-axon { background: var(--dourado); color: #000; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; text-transform: uppercase; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="card-auth">
        <div class="logo-axon">AXON</div>
        <h2 class="mb-6 text-gray-400 uppercase text-xs tracking-widest">Acesso Premium</h2>
        <input type="text" id="phone" class="axon-input" placeholder="NÚMERO DE CELULAR:">
        <input type="password" id="password" class="axon-input" placeholder="SENHA:">
        <button onclick="entrar()" class="btn-axon">ENTRAR NO SISTEMA</button>
        <p class="mt-4 text-[10px] text-gray-600">Ao entrar você concorda com os termos AXON.</p>
    </div>

    <script>
        const supabase = netlify.createClient('https://zqvfnykxwlcozvawqgrn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxdmZueWt4d2xjb3p2YXdxZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NDkzNDQsImV4cCI6MjA4NTMyNTM0NH0.CevpF9vP4748mb2vFNsOp5Kq6u7Nfp_100bJcW7ogUQ');

        async function entrar() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            if (!phone || !password) return alert("Preencha todos os campos.");

            // No AXON, usamos o celular como e-mail fictício para facilitar o Auth sem custos de SMS
            const email = `${phone}@axon.com`;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                // Se não existe, tenta criar a conta (Auto-registro)
                const { error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) return alert("Erro: " + signUpError.message);
                alert("Conta criada! Clique em Entrar novamente.");
            } else {
                window.location.href = 'axon.html';
            }
        }
    </script>
</body>
</html>
