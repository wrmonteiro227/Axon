<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON - Gestão Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AXON">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- IDENTIDADE VISUAL AXON --- */
        :root {
            --dourado: #d4af37;
            --preto-profundo: #050505;
            --cinza-card: #111111;
            --cinza-hover: #1a1a1a;
        }

        body {
            background-color: var(--preto-profundo);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Barra Superior Sólida AXON */
        .barra-topo {
            background-color: #000;
            height: calc(70px + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--dourado);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-axon {
            color: var(--dourado);
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        /* Menu de Navegação */
        .menu-abas {
            display: flex;
            justify-content: flex-start;
            background: #0a0a0a;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .menu-abas::-webkit-scrollbar { display: none; }

        .item-aba {
            padding: 15px 20px;
            color: #555;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            background: none;
            border: none;
        }
        .item-aba.ativa { color: var(--dourado); border-bottom: 3px solid var(--dourado); }

        /* Dashboard de Resumo */
        .grid-resumo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .resumo-card { background: #000; border: 1px solid rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 10px; text-align: center; }
        .resumo-label { color: #666; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .resumo-valor { color: var(--dourado); font-weight: 900; font-size: 1.1rem; }

        /* Estilo de Cards */
        .card-axon {
            background: var(--cinza-card);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .titulo-lista {
            color: var(--dourado);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center; gap: 12px;
        }

        .item-axon {
            background: rgba(0,0,0,0.4);
            border: 1px solid #222;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .axon-input {
            background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; font-size: 0.85rem;
        }

        /* --- BOTÃO FLUTUANTE DE DOWNLOAD --- */
        #btn-download-axon {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: var(--dourado);
            color: #000;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: none; /* Inicia oculto e aparece via JS */
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            z-index: 9999;
            cursor: pointer;
            border: 3px solid #fff;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-12px);}
            60% {transform: translateY(-6px);}
        }

        .secao-conteudo { display: none; animation: fadeIn 0.4s ease-out; }
        .secao-conteudo.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-axon { background: var(--dourado); color: #000; font-weight: bold; padding: 12px 20px; border-radius: 8px; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; border: none; }
        .badge { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; }
        .badge-pendente { background: rgba(212, 175, 55, 0.1); color: var(--dourado); border: 1px solid var(--dourado); }
        .badge-pago { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
        .badge-atrasado { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }

        .dash-cofre { background: linear-gradient(135deg, #000 0%, #1a1a1a 100%); border: 2px solid var(--dourado); padding: 40px 20px; text-align: center; border-radius: 20px; margin-bottom: 30px; }
        .valor-acumulado { font-size: 3.5rem; font-weight: 900; color: var(--dourado); text-shadow: 0 0 25px rgba(212, 175, 55, 0.4); }

        @media (max-width: 768px) {
            .grid-resumo { grid-template-columns: 1fr; }
            .valor-acumulado { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="barra-topo"><div class="logo-axon">AXON</div></header>

    <div id="btn-download-axon">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="black" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
        </svg>
    </div>

    <nav class="menu-abas">
        <button class="item-aba ativa" onclick="abrirAba('aba-recebimentos', this)">RECEBIMENTOS</button>
        <button class="item-aba" onclick="abrirAba('aba-pagamentos', this)">PAGAMENTOS</button>
        <button class="item-aba" onclick="abrirAba('aba-tarefas', this)">TAREFAS</button>
        <button class="item-aba" onclick="abrirAba('aba-cofre', this)">COFRE</button>
        <button class="item-aba" onclick="abrirAba('aba-ideias', this)">IDEIAS</button>
    </nav>

    <main class="p-4 md:p-8 max-w-5xl mx-auto">
        <section id="aba-recebimentos" class="secao-conteudo ativa">
            <div class="grid-resumo">
                <div class="resumo-card"><div class="resumo-label">A Receber</div><div id="total-receber" class="resumo-valor">R$ 0,00</div></div>
                <div class="resumo-card"><div class="resumo-label">Total Recebido</div><div id="total-receb-pago" class="resumo-valor" style="color: #10b981;">R$ 0,00</div></div>
                <div class="resumo-card"><div class="resumo-label">Em Atraso</div><div id="total-receb-atraso" class="resumo-valor" style="color: #ef4444;">R$ 0,00</div></div>
            </div>
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Quem está me devendo</h2>
                <div id="lista-quem-deve" class="mb-6"></div>
                <div class="grid flex flex-col gap-2">
                    <input type="text" id="reg-nome" class="axon-input" placeholder="DEVEDOR:">
                    <input type="text" id="reg-valor" class="axon-input" placeholder="VALOR:">
                    <input type="text" id="reg-data" class="axon-input" placeholder="DATA:">
                    <button onclick="registrarDivida()" class="btn-axon">Registrar</button>
                </div>
            </div>
        </section>

        <section id="aba-cofre" class="secao-conteudo">
            <div class="dash-cofre">
                <div class="resumo-label">PATRIMÔNIO ACUMULADO</div>
                <div id="valor-cofre-total" class="valor-acumulado">R$ 0,00</div>
            </div>
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> NOVO APORTE</h2>
                <div class="grid flex flex-col gap-2">
                    <input type="text" id="cofre-valor" class="axon-input" placeholder="VALOR:">
                    <input type="text" id="cofre-data" class="axon-input" placeholder="DATA:">
                    <button onclick="registrarNoCofre()" class="btn-axon">GUARDAR</button>
                </div>
            </div>
            <div id="lista-cofre" class="space-y-3"></div>
        </section>

        <section id="aba-pagamentos" class="secao-conteudo">
             <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Contas a Pagar</h2>
                <div id="lista-contas-pagar" class="mb-6"></div>
                <div class="grid flex flex-col gap-2">
                    <input type="text" id="pag-nome" class="axon-input" placeholder="DESCRIÇÃO:">
                    <input type="text" id="pag-valor" class="axon-input" placeholder="VALOR:">
                    <input type="text" id="pag-data" class="axon-input" placeholder="DATA:">
                    <button onclick="registrarPagamento()" class="btn-axon">Registrar</button>
                </div>
            </div>
        </section>
        
        <section id="aba-tarefas" class="secao-conteudo">
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Tarefas Diárias</h2>
                <input type="text" id="input-tarefa" class="axon-input w-full" placeholder="Ex: ir para igreja sabado">
                <div id="lista-tarefas" class="mt-6"></div>
            </div>
        </section>

        <section id="aba-ideias" class="secao-conteudo">
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Mural de Insights</h2>
                <textarea id="input-ideia" class="axon-input w-full h-32" placeholder="Escreva sua ideia..."></textarea>
                <button onclick="registrarIdeia()" class="btn-axon mt-2">Salvar</button>
                <div id="mural-ideias" class="mt-6"></div>
            </div>
        </section>
    </main>

    <script>
        function abrirAba(id, btn) { document.querySelectorAll('.secao-conteudo').forEach(s => s.classList.remove('ativa')); document.querySelectorAll('.item-aba').forEach(b => b.classList.remove('ativa')); document.getElementById(id).classList.add('ativa'); btn.classList.add('ativa'); }

        // BANCO DE DADOS
        let db_financeiro = JSON.parse(localStorage.getItem('axon_db')) || [];
        let db_cofre = JSON.parse(localStorage.getItem('axon_cofre')) || [];
        let db_pagamentos = JSON.parse(localStorage.getItem('axon_pagamentos')) || [];
        let db_tarefas = JSON.parse(localStorage.getItem('axon_tarefas')) || [];
        let db_ideias = JSON.parse(localStorage.getItem('axon_ideias')) || [];

        function formatarDataHoje() { const h = new Date(); return `${String(h.getDate()).padStart(2,'0')}/${String(h.getMonth()+1).padStart(2,'0')}/${h.getFullYear()}`; }
        function salvarTudo() { localStorage.setItem('axon_db', JSON.stringify(db_financeiro)); localStorage.setItem('axon_cofre', JSON.stringify(db_cofre)); localStorage.setItem('axon_pagamentos', JSON.stringify(db_pagamentos)); localStorage.setItem('axon_tarefas', JSON.stringify(db_tarefas)); localStorage.setItem('axon_ideias', JSON.stringify(db_ideias)); renderizar(); }

        // RENDERIZAÇÃO BÁSICA
        function renderizar() {
            const listCofre = document.getElementById('lista-cofre'); if(listCofre) listCofre.innerHTML = '';
            let totalCof = 0;
            db_cofre.forEach(i => { totalCof += parseFloat(i.valor.replace(',','.')); listCofre.innerHTML += `<div class="item-axon"><div>${i.data}</div><div class="font-black text-white">R$ ${i.valor}</div></div>`; });
            document.getElementById('valor-cofre-total').innerText = `R$ ${totalCof.toLocaleString('pt-BR')}`;
            // ... (Demais renderizações simplificadas para o exemplo carregar)
        }
        renderizar();

        // --- LÓGICA DO BOTÃO FORÇADO ---
        let deferredPrompt;
        const btnDownload = document.getElementById('btn-download-axon');

        // Monitora o evento de PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // FORÇA o botão a aparecer após 5 segundos, independente de qualquer erro
        setTimeout(() => {
            btnDownload.style.display = 'flex';
        }, 5000);

        btnDownload.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnDownload.style.display = 'none';
                deferredPrompt = null;
            } else {
                // Caso não seja Android ou não tenha PWA validado ainda
                alert("INSTALAR AXON:\n\nAndroid: Clique nos 3 pontinhos do Chrome e 'Instalar Aplicativo'.\n\niOS (iPhone): Clique no botão de compartilhar (quadrado com seta) e 'Adicionar à Tela de Início'.");
            }
        });

        // SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
</html>
